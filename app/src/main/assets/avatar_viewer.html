<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar Viewer</title>
    <style>
        body { margin: 0; background-color: transparent; overflow: hidden; }
        model-viewer {
            width: 100vw; height: 100vh;
            background-color: transparent;
            --poster-color: transparent;
            outline: none;
        }
    </style>
    <!-- Cargamos el script de model-viewer -->
    <script type="module" src="model-viewer-umd.min.js"></script>
</head>
<body>
<model-viewer
        id="avatar"
        src="src/avatar.glb"
        alt="Avatar Interactivo"
        camera-orbit="0deg 75deg 0.05m"
        camera-target="0m 1.68m 0m"
        field-of-view="2deg"
        autoplay
        animation-name="Idle"
        shadow-intensity="1"
        exposure="1"
        loading="eager"
        disable-zoom
        disable-pan>
</model-viewer>

<script>
    const modelViewer = document.querySelector('#avatar');
    let animationsList = [];

    modelViewer.addEventListener('load', () => {
        animationsList = modelViewer.availableAnimations;
        console.log("Modelo cargado. Animaciones disponibles:", animationsList);

        // Si había una animación pendiente, ejecutarla
        if (window.pendingAnim) {
            playAnimation(window.pendingAnim.name, window.pendingAnim.duration);
            window.pendingAnim = null;
        }
    });

    // Función global para que Android la llame
    window.playAnimation = function(animName, duration = 0) {
        if (!modelViewer) return;

        // Si el modelo aún no carga, guardamos la intención
        if (animationsList.length === 0) {
            window.pendingAnim = { name: animName, duration: duration };
            return;
        }

        let targetAnim = animName;

        // Lógica de fallback para la animación de hablar
        if (!animationsList.includes(targetAnim)) {
            if (targetAnim === 'Talk') {
                const fallback = animationsList.find(a => a.toLowerCase().includes('talk') || a.toLowerCase().includes('speak'));
                targetAnim = fallback || (animationsList.includes('Wave') ? 'Wave' : animationsList[0]);
                console.warn(`Animación 'Talk' no encontrada. Usando: ${targetAnim}`);
            } else if (!animationsList.includes(targetAnim)) {
                targetAnim = animationsList.includes('Idle') ? 'Idle' : animationsList[0];
            }
        }

        console.log(`Ejecutando animación: ${targetAnim}`);
        modelViewer.animationName = targetAnim;
        modelViewer.play();

        if (duration > 0) {
            setTimeout(() => {
                modelViewer.animationName = "Idle";
            }, duration);
        }
    };

    modelViewer.addEventListener('click', () => {
        if (animationsList.includes('Wave')) {
            playAnimation('Wave', 2000);
        }
    });
</script>
</body>
</html>
